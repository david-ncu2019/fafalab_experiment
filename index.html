<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Progress Dashboard | NCU Applied Geology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-completed { border-top: 8px solid #10b981; background: white; }
        .card-in-progress { border-top: 8px solid #f59e0b; background: white; }
        .card-delayed { border-top: 8px solid #ef4444; background: white; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">🧪 LAB EXPERIMENTS - APRIL 2026</h1>
                <p class="text-slate-500 mt-2 text-lg font-medium">Real-time Geotechnical Laboratory Progress Monitor</p>
            </div>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2tvVkfStkYMn2fDNepvAHrqcZaaYFFUmjQQPzbpr11ll6kw/viewform" target="_blank" 
               class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 flex items-center">
                <span class="mr-2">+</span> Submit New Update
            </a>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="text-center col-span-full py-20">
                <p class="text-slate-400 text-lg animate-pulse font-medium">Synchronizing data from Laboratory database...</p>
            </div>
        </div>
    </div>

    <script>
        // Your Published CSV Link
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5SRsUBQcGkPLKTnGXeymuHQ0hTvQTUSIw-BY29FdvaLt-XDAnVjUzHJNhRoQCBgu3Wu5ANX6m_rbd/pub?output=csv';

        const taskIcons = {
            'Drying Samples': '🌡️',
            'Falling Head Test': '🧪',
            'Sieve Analysis Test': '🏜️',
            'Water Retention Curve': '💧'
        };

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const container = document.getElementById('dashboard');
                container.innerHTML = '';
                
                // Fetch the latest entry for each unique Group Number
                const latestUpdates = {};
                results.data.reverse().forEach(row => {
                    const group = row["Group Number"];
                    if (group && !latestUpdates[group]) {
                        latestUpdates[group] = row;
                    }
                });

                // Sort and Display
                Object.keys(latestUpdates).sort().forEach(groupName => {
                    const data = latestUpdates[groupName];
                    const status = data["Task Status"];
                    const isCompleted = status === 'Completed';
                    const isDelayed = status === 'Delayed';
                    const icon = taskIcons[data["Your Current Task"]] || '📋';
                    
                    let cardClass = 'card-in-progress';
                    let statusBadgeClass = 'bg-amber-100 text-amber-700';
                    let dotClass = 'bg-amber-500 status-pulse';
                    
                    if (isCompleted) {
                        cardClass = 'card-completed';
                        statusBadgeClass = 'bg-emerald-100 text-emerald-700';
                        dotClass = 'bg-emerald-500';
                    } else if (isDelayed) {
                        cardClass = 'card-delayed';
                        statusBadgeClass = 'bg-rose-100 text-rose-700';
                        dotClass = 'bg-rose-500 status-pulse';
                    }

                    const card = document.createElement('div');
                    card.className = `${cardClass} p-8 rounded-2xl shadow-sm border border-slate-100 transition-all hover:shadow-xl`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">${groupName}</span>
                            <span class="text-xs text-slate-400">${data["Timestamp"].split(' ')[0]}</span>
                        </div>
                        
                        <div class="mb-8">
                            <div class="text-4xl mb-3">${icon}</div>
                            <h3 class="text-xl font-bold text-slate-800 leading-tight">${data["Your Current Task"]}</h3>
                            <div class="flex items-center mt-2 text-blue-600">
                                <span class="text-xs font-bold uppercase mr-1 text-slate-400">Sample:</span>
                                <span class="font-bold tracking-tight">${data["Sample Number"]}</span>
                            </div>
                        </div>

                        <div class="flex items-center mb-4">
                            <div class="w-2.5 h-2.5 rounded-full mr-2.5 ${dotClass}"></div>
                            <span class="px-3 py-1 rounded-lg text-[11px] font-black uppercase tracking-tighter ${statusBadgeClass}">
                                ${status}
                            </span>
                        </div>

                        ${data["Report Problems"] ? `
                            <div class="mt-6 pt-4 border-t border-slate-50">
                                <p class="text-[10px] text-slate-400 uppercase font-black mb-2 tracking-widest">Technician Notes:</p>
                                <p class="text-sm text-slate-600 leading-relaxed italic italic">"${data["Report Problems"]}"</p>
                            </div>
                        ` : ''}
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
