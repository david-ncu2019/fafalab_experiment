<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Matrix | NCU Applied Geology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-in-progress { background-color: #fef08a; color: #854d0e; font-weight: bold; text-align: center; } /* Yellow */
        .status-completed { background-color: #bbf7d0; color: #166534; font-weight: bold; text-align: center; }   /* Green */
        .status-delayed { background-color: #fecaca; color: #991b1b; font-weight: bold; text-align: center; }     /* Red */
        th { background-color: #1e293b; color: white; padding: 12px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        td { border: 1px solid #e2e8f0; padding: 10px; font-size: 0.875rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">🧪 GEOTECHNICAL TEST MATRIX</h1>
                <p class="text-slate-500 font-medium italic">NCU Applied Geology Lab - April 2026</p>
            </div>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSd2tvVkfStkYMn2fDNepvAHrqcZaaYFFUmjQQPzbpr11ll6kw/viewform" target="_blank" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Submit Update</a>
        </header>

        <div class="bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            <th>Sample ID</th>
                            <th>Drying Samples</th>
                            <th>Falling Head Test</th>
                            <th>Sieve Analysis Test</th>
                            <th>Water Retention Curve</th>
                            <th>Notes/Problems</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body">
                        <tr>
                            <td colspan="6" class="text-center py-20 text-slate-400 animate-pulse">Processing laboratory data matrix...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5SRsUBQcGkPLKTnGXeymuHQ0hTvQTUSIw-BY29FdvaLt-XDAnVjUzHJNhRoQCBgu3Wu5ANX6m_rbd/pub?output=csv';

        const tasks = ["Drying Samples", "Falling Head Test", "Sieve Analysis Test", "Water Retention Curve"];

        function getStatusClass(status) {
            if (status === 'In Progress') return 'status-in-progress';
            if (status === 'Completed') return 'status-completed';
            if (status === 'Delayed') return 'status-delayed';
            return '';
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const matrix = {};
                const notes = {};

                // Process data: keep only the newest status for each Sample + Task pair
                results.data.forEach(row => {
                    const sample = row["Sample Number"];
                    const task = row["Your Current Task"];
                    const status = row["Task Status"];
                    const problem = row["Report Problems"];

                    if (sample) {
                        if (!matrix[sample]) matrix[sample] = {};
                        matrix[sample][task] = status;
                        if (problem && problem !== "NaN") notes[sample] = problem;
                    }
                });

                const tbody = document.getElementById('matrix-body');
                tbody.innerHTML = '';

                // Sort samples naturally (1-0, 1-3, 1-5...)
                const sortedSamples = Object.keys(matrix).sort();

                sortedSamples.forEach(sample => {
                    const tr = document.createElement('tr');
                    
                    // Column 1: Sample ID
                    let html = `<td class="font-bold text-slate-700 bg-slate-50">${sample}</td>`;
                    
                    // Columns 2-5: Tasks
                    tasks.forEach(task => {
                        const status = matrix[sample][task] || '';
                        html += `<td class="${getStatusClass(status)}">${status}</td>`;
                    });

                    // Column 6: Notes
                    html += `<td class="text-xs text-slate-500 italic">${notes[sample] || '-'}</td>`;
                    
                    tr.innerHTML = html;
                    tbody.appendChild(tr);
                });
            }
        });
    </script>
</body>
</html>
